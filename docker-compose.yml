networks:
  rinha_net:
    driver: bridge

services:
  haproxy:
    image: haproxy:2.8-alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 30M
    networks:
      - rinha_net
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
      api3:
        condition: service_healthy
      api4:
        condition: service_healthy

  api1: &api
    image: docker.io/nelsonsimionato/rinha-backend-2026:v0.11-boundprune-opt
    deploy:
      resources:
        limits:
          cpus: '0.225'
          memory: 80M
    networks:
      - rinha_net
    healthcheck:
      test: ["CMD", "./healthcheck"]
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 20

  api2:
    <<: *api

  api3:
    <<: *api

  api4:
    <<: *api
