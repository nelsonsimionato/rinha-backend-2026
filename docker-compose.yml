networks:
  rinha_net:
    driver: bridge

services:
  haproxy:
    image: haproxy:2.8-alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 50M
    networks:
      - rinha_net
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy

  api1:
    build: .
    environment:
      # Runtime tunable. Override via shell env: `IVF_PROBE=24 docker compose up`.
      # Range 1..32 (IvfProbeMax in main.go). Higher = better recall, more CPU/req.
      - IVF_PROBE=${IVF_PROBE:-16}
    deploy:
      resources:
        limits:
          cpus: '0.40'
          memory: 150M
    networks:
      - rinha_net
    healthcheck:
      test: ["CMD", "./healthcheck"]
      # Cold start spans the 45 MB index mmap + pre-warm loop (one byte per 4KB page).
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 20

  api2:
    build: .
    environment:
      - IVF_PROBE=${IVF_PROBE:-16}
    deploy:
      resources:
        limits:
          cpus: '0.40'
          memory: 150M
    networks:
      - rinha_net
    healthcheck:
      test: ["CMD", "./healthcheck"]
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 20
