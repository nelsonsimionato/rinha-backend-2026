global
    # 4096 is ~80× the 50 VU concurrent load and stays well under the GitHub
    # Actions runner's ulimit (65536). HAProxy reserves roughly maxconn × 2 FDs
    # at startup; we had 100000 which tried to raise FD limit to 200027 and
    # crashed with "Cannot raise FD limit". See PR #5048 smoke-test failure.
    maxconn 4096
    nbthread 1
    # silence access logs — every request log is wasted CPU on the LB at the p99 budget
    log /dev/null local0

defaults
    # mode tcp: skip HTTP parsing at the LB. The C backend handles everything;
    # raw byte forwarding takes about 60% of the LB CPU vs mode http.
    mode tcp
    option dontlog-normal
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    retries 2

frontend tcp-in
    bind *:9999
    default_backend api_servers

backend api_servers
    balance roundrobin
    option tcp-check
    tcp-check send "GET /ready HTTP/1.1\r\nHost: lb\r\n\r\n"
    tcp-check expect string "200 OK"
    server api1 api1:8080 check inter 2s rise 3 fall 5
    server api2 api2:8080 check inter 2s rise 3 fall 5
    server api3 api3:8080 check inter 2s rise 3 fall 5
    server api4 api4:8080 check inter 2s rise 3 fall 5
