global
    # 4096 is ~80× the 50 VU concurrent load and stays well under the GitHub
    # Actions runner's ulimit (65536). HAProxy reserves roughly maxconn × 2 FDs
    # at startup; we had 100000 which tried to raise FD limit to 200027 and
    # crashed with "Cannot raise FD limit". See PR #5048 smoke-test failure.
    maxconn 4096
    nbthread 1
    # silence access logs — every request log is wasted CPU on the LB at the p99 budget
    log /dev/null local0

defaults
    mode http
    option http-keep-alive
    option dontlog-normal
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-keep-alive 30s
    retries 2

frontend http-in
    bind *:9999
    default_backend api_servers

backend api_servers
    balance roundrobin
    option forwardfor
    option httpchk GET /ready
    http-check expect status 200
    server api1 api1:8080 check inter 2s rise 3 fall 5
    server api2 api2:8080 check inter 2s rise 3 fall 5
